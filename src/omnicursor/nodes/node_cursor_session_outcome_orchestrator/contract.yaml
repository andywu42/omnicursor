name: node_cursor_session_outcome_orchestrator
contract_name: node_cursor_session_outcome_orchestrator
node_name: node_cursor_session_outcome_orchestrator

contract_version:
  major: 1
  minor: 0
  patch: 0

node_version:
  major: 1
  minor: 0
  patch: 0

node_type: ORCHESTRATOR_GENERIC

description: >
  Session stop / outcome aggregation (4-gate classification) and persistence.
  Approximates OmniClaude session-end / telemetry reducers in a Cursor-native way.

cursor_native:
  hook_event: stop
  hooks_json_command: "python3 .cursor/hooks/scripts/stop.py"
  implementation: .cursor/hooks/scripts/stop.py
  blocking: false

execution:
  backend: cursor_ide

local_event_bus:
  kind: append_only_jsonl
  path: "~/.omnicursor/events.jsonl"
  durable_outbox:
    path: "~/.omnicursor/outbox.jsonl"
    schema_version: omnicursor.session_outcome.v1
    notes: >
      Each line is a session outcome row. Must include injected_pattern_ids
      (list of pattern_id strings, possibly empty) aggregated from prompt_classified
      events so the outbox drainer can emit utilization.scoring.requested.

capabilities:
  - name: cursor.session_outcome
    description: Derive session outcome from stop payload and prior events
    version: 1.0.0

metadata:
  license: MIT
  parity_reference: omniclaude stop / session outcome subscribers
  tags:
    - orchestrator
    - cursor
    - stop
