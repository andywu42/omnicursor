# Read-side pattern selection for prompt injection (local ``learned_patterns.json`` only).

name: node_cursor_pattern_injection_compute
contract_name: node_cursor_pattern_injection_compute
node_name: node_cursor_pattern_injection_compute

contract_version:
  major: 1
  minor: 0
  patch: 0

node_version:
  major: 1
  minor: 0
  patch: 0

node_type: COMPUTE

description: >
  Session-level context injection via Cursor's sessionStart.additional_context
  (the real injection channel — beforeSubmitPrompt is block-only and cannot
  inject). Reads learned patterns (intelligence API first, local JSON fallback)
  and returns baseline patterns + delegation rule + prior-session context at
  session creation. The postToolUse hook (node_cursor_tool_use_compute) refreshes
  this mid-session. No writes beyond the local event log.

cursor_native:
  hook_event: sessionStart
  hooks_json_command: "python3 .cursor/hooks/scripts/session-start.py"
  implementation: .cursor/hooks/scripts/session-start.py
  blocking: false

execution:
  backend: cursor_ide
  notes: >
    Context assembly in .cursor/hooks/lib/context_injection.py (shared by
    session-start.py and post-tool-use.py); pattern scoring in
    .cursor/hooks/lib/prompt_pattern_selection.py.

local_event_bus:
  kind: append_only_jsonl
  path: "~/.omnicursor/events.jsonl"

capabilities:
  - name: cursor.pattern_injection_read
    description: Load and rank patterns from learned_patterns.json for a prompt
    version: 1.0.0

metadata:
  license: MIT
  tags:
    - compute
    - cursor
    - patterns
    - read-only
