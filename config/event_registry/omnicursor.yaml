# Event Registry: OmniCursor Platform
# Loaded by omnimarket.nodes.node_emit_daemon.event_registry.EventRegistry.from_yaml
#
# Transform names reference callables in TRANSFORM_REGISTRY:
#   - passthrough: no modification
#   - strip_prompt: remove full prompt, keep preview + length
#   - strip_body: remove body, keep preview + length
#
# Every fan-out rule MUST declare a durability tier (duty_critical | telemetry)
# or the daemon refuses to load this file (event_registry.py raises ValueError).
# Tiers mirror the canonical claude_code registry
# (omnimarket .../node_emit_daemon/registries/topics.yaml) for the shared keys.
platform: omnicursor
version: "1.0.0"
description: "Event registry for OmniCursor Cursor IDE hooks"

events:
  # =========================================================================
  # Session Events
  # =========================================================================
  session.started:
    fan_out:
      - topic: "onex.evt.omnicursor.session-started.v1"
        tier: telemetry
        description: "Session start event for observability"
    partition_key_field: session_id
    required_fields: [session_id]

  session.ended:
    fan_out:
      - topic: "onex.evt.omnicursor.session-ended.v1"
        tier: telemetry
        description: "Session end event for observability"
    partition_key_field: session_id
    required_fields: [session_id]

  session.outcome:
    fan_out:
      - topic: "onex.cmd.omniintelligence.session-outcome.v1"
        tier: duty_critical
        description: "Session outcome for intelligence feedback loop"
      - topic: "onex.evt.omnicursor.session-outcome.v1"
        tier: duty_critical
        description: "Session outcome for dashboards and monitoring"
    partition_key_field: session_id
    required_fields: [session_id, outcome]

  # =========================================================================
  # Intelligence Commands
  # =========================================================================
  utilization.scoring.requested:
    fan_out:
      - topic: "onex.cmd.omniintelligence.utilization-scoring.v1"
        tier: telemetry
        description: "Utilization scoring command to omniintelligence"
    partition_key_field: session_id
    required_fields: [session_id, injected_pattern_ids]

  # =========================================================================
  # Prompt Events (two-key privacy split, ratified 2026-07-05)
  # =========================================================================
  # The restricted cmd topic carries the full canonical ModelCursorHookEvent
  # (extra="forbid": the hook nests the redacted prompt inside payload), while
  # the broadcast evt topic only ever receives a hook-side redacted preview.
  # strip_prompt cannot descend into the canonical nested payload, so the
  # split is enforced at the hook — one single-purpose key per topic.
  cursor.hook.prompt:
    fan_out:
      - topic: "onex.cmd.omniintelligence.cursor-hook-event.v1"
        tier: telemetry
        transform: passthrough
        description: "Canonical ModelCursorHookEvent for intent classification"
    partition_key_field: session_id
    required_fields: [event_type, session_id]

  prompt.submitted:
    fan_out:
      - topic: "onex.evt.omnicursor.prompt-submitted.v1"
        tier: telemetry
        transform: strip_prompt
        description: "Sanitized prompt preview for observability"
    partition_key_field: session_id
    required_fields: [prompt_preview, session_id]

  # =========================================================================
  # Tool Events
  # =========================================================================
  tool.executed:
    fan_out:
      - topic: "onex.evt.omnicursor.tool-executed.v1"
        tier: telemetry
        description: "Tool execution event for observability"
    partition_key_field: session_id
    required_fields: [tool_name, session_id]

  # =========================================================================
  # Injection Events
  # =========================================================================
  injection.recorded:
    fan_out:
      - topic: "onex.evt.omnicursor.injection-recorded.v1"
        tier: telemetry
        description: "Injection tracking for A/B analysis"
    partition_key_field: session_id
    required_fields: [injection_id, session_id, cohort]
